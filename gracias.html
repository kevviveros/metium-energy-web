<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias! | Metium Energy</title>
    <meta name="description" content="Tus resultados estimados de ahorro solar. Metium Energy, Veracruz.">
    <meta name="robots" content="noindex">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        /* Nav */
        .top-nav {
            position: fixed;
            top: 1rem;
            left: 0; right: 0;
            margin: 0 auto;
            width: calc(100% - 3rem);
            max-width: 1200px;
            background: #fff;
            border-radius: 4rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 24px rgba(15,23,42,0.08);
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            color: #0f172a;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
        }
        .logo span { color: #1d4ed8; }
        .logo img { display: none; height: 28px; } /* Mobile logo hidden by default */

        .nav-btn {
            background: #1d4ed8;
            color: #fff;
            border: none;
            border-radius: 4rem;
            padding: 0.6rem 1.5rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Card */
        .card {
            background: #fff;
            border-radius: 2rem;
            padding: 3rem 2.5rem;
            max-width: 700px;
            width: 100%;
            margin-top: 5rem;
            box-shadow: 0 30px 80px rgba(0,0,0,0.25);
            text-align: center;
            animation: fadeUp 0.6s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .check-icon {
            width: 72px;
            height: 72px;
            background: #eff6ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: #1d4ed8;
        }

        .card h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            color: #0f172a;
            margin-bottom: 0.75rem;
        }

        .card .subtitle {
            color: #64748b;
            font-size: 1rem;
            margin-bottom: 2.5rem;
        }

        /* Results table */
        .results-box {
            background: #f8fafc;
            border-radius: 1.5rem;
            padding: 1.75rem 2rem;
            text-align: left;
            margin-bottom: 2.5rem;
        }

        .results-box h3 {
            font-family: 'Outfit', sans-serif;
            color: #0f172a;
            font-size: 1.05rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.9rem 0;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.95rem;
        }

        .result-row:last-child { border-bottom: none; }

        .result-row .label { color: #64748b; }
        .result-row .value {
            color: #1d4ed8;
            font-weight: 700;
            font-size: 1rem;
        }

        /* CTA */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: #1d4ed8;
            color: #fff;
            padding: 1rem 2.5rem;
            border-radius: 4rem;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            transition: background 0.2s;
        }
        .back-btn:hover { background: #1e40af; }

        /* WA hint */
        .wa-hint {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
        }
        .wa-hint a { color: #60a5fa; }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .top-nav {
                padding: 0.6rem 1rem;
                width: calc(100% - 1.5rem);
            }
            .logo .text-logo { display: none; }
            .logo img { display: block; }
            .nav-btn {
                padding: 0.5rem 0.8rem;
                font-size: 0.85rem;
                gap: 0.3rem;
            }
            .nav-btn svg { width: 14px; height: 14px; }
            .card { padding: 2rem 1.5rem; margin-top: 6rem; }
            .card h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Nav -->
    <nav class="top-nav">
        <a class="logo" href="index.html">
            <img src="logo-metium.png" alt="Metium Energy Logo" />
        </a>
        <a href="https://wa.me/5212282100749?text=Hola%2C%20me%20gustar%C3%ADa%20cotizar%20mis%20paneles" class="nav-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            WhatsApp
        </a>
    </nav>

    <!-- Result Card -->
    <div class="card">
        <div class="check-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <h1>¡Cálculo realizado con éxito!</h1>
        <p class="subtitle" style="color: #1d4ed8; font-weight: 700; background: #eff6ff; padding: 0.8rem 1.5rem; border-radius: 1rem; display: inline-block; margin-bottom: 2.5rem;">
            Un asesor experto se pondrá en contacto contigo muy pronto.
        </p>

        <div style="display: flex; flex-direction: column; gap: 1.5rem; align-items: center; margin-top: 1.5rem;">
            <a href="https://wa.me/5212282100749?text=Hola%2C%20me%20gustar%C3%ADa%20cotizar%20mis%20paneles" class="back-btn" style="background: #10b981; width: 100%; max-width: 280px; padding: 0.8rem 1.5rem; font-size: 0.95rem; justify-content: center; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4); transform: translateY(-2px);">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.4rem;"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-13.2 8.38 8.38 0 0 1 3.8.9l5.2-1.3-1.3 5.2z"/></svg>
                Hablar con un asesor
            </a>
            
            <a href="index.html" style="color: #64748b; text-decoration: none; font-weight: 700; font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem; transition: color 0.2s; padding: 0.5rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Volver al Inicio
            </a>
        </div>
    </div>

    <p class="wa-hint">¿Tienes dudas inmediatas? <a href="https://wa.me/5212282100749?text=Hola%2C%20me%20gustar%C3%ADa%20cotizar%20mis%20paneles">Contáctanos por WhatsApp</a></p>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Confetti
            const duration = 3 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 50 * (timeLeft / duration);
                
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        });
    </script>
</body>
</html>
